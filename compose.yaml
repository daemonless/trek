name: trek

x-daemonless:
  title: "Trek"
  icon: ":material-map-marker-path:"
  category: "Productivity"
  description: "Self-hosted travel/trip planner with real-time collaboration, interactive maps, PWA support, SSO, budgets, and packing lists."
  upstream_url: "https://github.com/mauriceboe/TREK"
  web_url: "https://liketrek.com/"
  user: "bsd"
  mlock: false
  community: "Discord:https://discord.gg/Kb9tkhecZT"
  appjail: true

  docs:
    env:
      PUID: "User ID for the application process"
      PGID: "Group ID for the application process"
      TZ: "Timezone for the container"
    volumes:
      /config: "Configuration directory"
    ports:
      3000: "Web UI"

services:
  trek:
    image: ghcr.io/daemonless/trek:latest
    container_name: trek
    restart: unless-stopped


    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC

    volumes:
      - /path/to/containers/trek:/config

    ports:
      - 3000:3000
